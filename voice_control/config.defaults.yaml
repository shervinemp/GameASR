# Default configuration for the Voice Control application
# This file contains default values and should be checked into version control.
# Users can override these settings by creating a 'config.yaml' file in the project root.

# --- Database Configuration ---
database:
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    # The password should be loaded from an environment variable, not stored here.
    password_env: "NEO4J_PASSWORD"

# --- LLM Configuration ---
llm:
  # Default provider to use. Can be 'openai', 'gemini', 'ollama', etc.
  # This setting can be used to dynamically load the correct LLM class.
  provider: "NemotronMini"

  # --- Model specifications ---
  models:
    # Default model for general purpose tasks, chat, etc.
    default: "llama3"
    # Model used for the offline knowledge extraction script
    extraction_heavy: "gemini-1.5-pro"
    # Embedding model for RAG
    embedding: "avsolatorio/GIST-small-Embedding-v0"

  # --- Provider-specific settings ---
  providers:
    ollama:
      model: "qwen3:latest"
    gemini:
      api_key_env: "GEMINI_API_KEY"
    openai:
      api_key_env: "OPENAI_API_KEY"

# --- TTS Configuration ---
tts:
  provider: "Kokoro"
  # Base directory for TTS models
  model_dir: "model_files/tts"

# --- ASR Configuration ---
asr:
  provider: "ParakeetV2"
  model_dir: "model_files/asr"

#----------------------------

# --- RPC Server Configuration ---
rpc_server:
  # The authentication token for the RPC server.
  # If null, authentication is disabled.
  # It is strongly recommended to set a secure token in your config.yaml
  auth_token: null

# --- Tools Server Configuration ---
tools_server:
  # The authentication token for the tools server (the Lua game).
  # If null, authentication is disabled.
  # It is strongly recommended to set a secure token in your config.yaml
  auth_token: null
