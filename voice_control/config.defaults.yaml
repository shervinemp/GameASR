# Default configuration for the Voice Control application
# This file contains default values and should be checked into version control.
# Users can override these settings by creating a 'config.yaml' file in the project root.

# --- Database Configuration ---
database:
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    database: "neo4j"
    query_timeout_seconds: 5
    env:
      password: "NEO4J_PASSWORD"

# --- LLM Configuration ---
llm:
  # Provider: one of Qwen3, Gemma4E2B, Gemma4_12B (GGUF/local), or LiteLLM (remote).
  provider: "Gemma4_12B"
  # Maximum tool-calling iterations per utterance.
  # 0 = tools disabled. 1 = single tool call (default). 2+ = chaining.
  max_tool_iterations: 1

  # --- Model specifications ---
  models:
    # Default model for general purpose tasks, chat, etc.
    default: "llama3"
    # Model used for the offline knowledge extraction script
    extraction_heavy: "gemini-1.5-pro"
    # Embedding model for RAG
    embedding: "avsolatorio/GIST-small-Embedding-v0"

  # --- Provider-specific settings ---
  providers:
    # LiteLLM-backed providers: set provider to "openai", "gemini", or "ollama".
    litellm:
      provider: "ollama"
      model: "qwen3:latest"
      api_base: "http://localhost:11434"
      timeout: 60
      max_tokens: 1024

# --- Hotkey Configuration ---
# Controls how ASR listening is activated.
#   push_to_talk: null     → Voice activation (VAD) is always-on.
#     (the default — ASR listens continuously and VAD segments speech)
#   push_to_talk: "<key>"  → Push-to-talk mode.
#     (ASR is muted until the hotkey is held; e.g. '<ctrl_r>+<shift_r>')
#
#   press_to_reset: null   → No reset hotkey.
#   press_to_reset: "<key>" → Press to reset conversation.
hotkeys:
  # Set enable: false to temporarily disable all hotkeys (always-on VAD)
  # without removing the key bindings below.
  enable: true
  push_to_talk: null
  press_to_reset: null

# --- TTS Configuration ---
tts:
  provider: "Kokoro"
  # Base directory for TTS models
  weights_dir: "model_files/tts"

# --- ASR Configuration ---
asr:
  provider: "ParakeetV2"
  weights_dir: "model_files/asr"
  # VAD (Voice Activity Detection) thresholds
  vad_threshold: 0.4       # Speech probability threshold (0.0-1.0)
  trailing_silence_ms: 800 # ms of silence before speech segment ends
  leading_silence_ms: 1000 # ms of pre-roll audio kept before speech onset
  max_segment_duration: 0  # seconds; force-flush VAD if speech exceeds this (0 = disabled)
                           # (safety net for sustained noise causing hangs; 0 disables)

#----------------------------

# --- RPC Server Configuration ---
rpc_server:
  # The authentication token for the RPC server.
  # Loopback listeners may omit authentication. Non-loopback TCP listeners
  # fail closed unless this environment variable contains at least 32 chars.
  env:
    auth_token: "RPC_AUTH_TOKEN"
  max_request_bytes: 65536
  requests_per_minute: 60

# --- Tools Server Configuration ---
tools_server:
  # The authentication token for the tools server (the Lua game).
  env:
    auth_token: "TOOLS_AUTH_TOKEN"

# --- RAG Persistence Configuration ---
rag:
  # --- Conversation context management ---
  conversation:
    max_turns: 20 # visible history turns; oldest dropped when exceeded

  # --- Conversation history auto-inject ---
  conversation_history:
    enabled: true
    threshold: 0.75  # min similarity score to auto-inject old context
    top_k: 2         # max old turns prepended to current query

  runtime:
    # Hard limits keep retrieval below the tool server's 10-second deadline.
    max_query_chars: 2000
    top_k: 5
    reranker_input_limit: 20
    max_direct_context_tokens: 2048
    retrieval_deadline_seconds: 8
    web_timeout_seconds: 4
    cache_ttl_seconds: 300
    cache_size: 128
    max_iterations: 3
  active_learning:
    # Model-generated facts are never persisted automatically by default.
    enabled: false
    allow_web_context: false
    review_required: true
    review_queue_path: "data/pending_triplets.jsonl"
    max_triplets_per_answer: 20
