database:
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    database: "neo4j"
    query_timeout_seconds: 5
    env:
      password: "NEO4J_PASSWORD"

asr:
  vad_threshold: 0.4
  trailing_silence_ms: 2000
  leading_silence_ms: 1000
  max_segment_duration: 60

llm:
  provider: "Gemma4E4B"
  models:
    default: ""
    extraction_heavy: ""
    embedding: "avsolatorio/GIST-small-Embedding-v0"
  providers:
    gemma4e4b: {}
    litellm:
      provider: "openai"
      model: "Ternary-Bonsai-27B-Q2_0.gguf"
      api_base: "http://localhost:9000/v1"
      timeout: 120
      n_ctx: 65536
      max_tokens: 8192

rag:
  runtime:
    backend: "neo4j"
    top_k: 3
